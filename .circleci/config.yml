version: 2.1

jobs:
  goals-api-tests:
    docker:
      - image: cypress/browsers:node-20.18.0-chrome-131.0.6778.69-1-ff-131.0-edge-131.0.1-1

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
            - node_modules

      - run:
          name: Run goals Cypress tests
          command: npm run run:goals

      - store_artifacts:
          path: cypress/screenshots
          when: on_fail

      - store_artifacts:
          path: cypress/videos
          when: on_fail

workflows:
  goals-tests:
    jobs:
      - goals-api-tests
